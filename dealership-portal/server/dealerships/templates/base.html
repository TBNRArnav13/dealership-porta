<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Best Cars Dealership{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body { font-family: 'Segoe UI', sans-serif; }
    .navbar-brand { font-weight: 700; font-size: 1.4rem; }
    .hero { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: white; padding: 80px 0; }
    .card { transition: transform .2s; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
    footer { background: #1a1a2e; color: #ccc; }
    .sentiment-positive { color: #198754; font-weight: 600; }
    .sentiment-negative { color: #dc3545; font-weight: 600; }
    .sentiment-neutral  { color: #6c757d; font-weight: 600; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="fas fa-car me-2"></i>Best Cars</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/about/">About Us</a></li>
        <li class="nav-item"><a class="nav-link" href="/contact/">Contact</a></li>
      </ul>
      <div id="auth-nav" class="d-flex align-items-center gap-2"></div>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<footer class="py-4 mt-5">
  <div class="container text-center">
    <p class="mb-0">&copy; 2026 Best Cars Dealership. All rights reserved.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Render auth nav based on session
  fetch('/api/logout/', {method:'GET'}).catch(()=>{});
  const user = sessionStorage.getItem('username');
  const nav = document.getElementById('auth-nav');
  if (user) {
    nav.innerHTML = `<span class="text-light me-2">Hello, <strong>${user}</strong></span>
      <a href="#" class="btn btn-outline-light btn-sm" onclick="doLogout()">Logout</a>`;
  } else {
    nav.innerHTML = `<a href="/#login" class="btn btn-outline-light btn-sm me-2">Login</a>
      <a href="/#register" class="btn btn-primary btn-sm">Register</a>`;
  }
  function doLogout() {
    fetch('/api/logout/').then(()=>{ sessionStorage.clear(); location.href='/'; });
  }
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
